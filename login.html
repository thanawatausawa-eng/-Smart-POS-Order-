<!DOCTYPE html>
<!--
  Web App: ?page=Login หรือ /exec เปล่า | หลังล็อกอิน → ?page=Admin
  ชื่อร้าน/โลโก้ จาก getStoreSettings() (Store_Settings)
-->
<html lang="th">
<head>
  <base target="_top">
  <script>
    window.__WEB_APP_BASE__ = <?!= JSON.stringify(webAppBaseUrl || '') ?>;
  </script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>เข้าสู่ระบบแอดมิน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Prompt:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
  <style>
    :root {
      --primary: #ea580c;
      --primary-hover: #c2410c;
      --primary-soft: #fff7ed;
      --bg-app: #e8ecf0;
      --bg-mesh: linear-gradient(180deg, #eef1f5 0%, #e4e9ef 100%);
      --text-dark: #0f172a;
      --text-muted: #64748b;
      --danger: #e11d48;
      --radius-xl: 12px;
      --shadow-md: 0 4px 24px rgba(15, 23, 42, 0.08);
    }
    body {
      margin: 0;
      min-height: 100dvh;
      font-family: 'Prompt', 'Inter', ui-sans-serif, system-ui, sans-serif;
      background: var(--bg-app);
      background-image: var(--bg-mesh);
      background-attachment: fixed;
      color: var(--text-dark);
    }
    #login-screen {
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(20px, env(safe-area-inset-top)) 20px max(20px, env(safe-area-inset-bottom));
    }
    .login-card {
      background: #ffffff;
      border-radius: var(--radius-xl);
      padding: 36px 22px;
      width: 100%;
      max-width: 400px;
      box-shadow: var(--shadow-md);
      border: 1px solid #e2e8f0;
      text-align: center;
      animation: fadeIn 0.55s ease-out;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: none; }
    }
    @media (min-width: 576px) { .login-card { padding: 48px 40px; } }
    .btn-login {
      background: var(--primary);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 14px 16px;
      font-weight: 600;
      width: 100%;
      margin-top: 15px;
      font-size: 0.95rem;
      box-shadow: 0 1px 2px rgba(15, 23, 42, 0.08);
    }
    .btn-login:hover { background: var(--primary-hover); color: #fff; }
    .login-error { color: var(--danger); font-size: 0.85rem; margin-top: 15px; display: none; font-weight: 600; }
  </style>
</head>
<body>
  <section id="login-screen">
    <div class="login-card">
      <img id="login-brand-logo" src="https://lh3.googleusercontent.com/d/1P7QyEmBDrd16omNL91JyE3FnKOwipBZ5" alt="Logo" class="mb-3" style="width: 120px; height: 120px; object-fit: cover; border: 2px solid var(--primary-soft); border-radius: 50%; background-color: white; box-shadow: 0 8px 20px rgba(0,0,0,0.06);">
      <h3 id="login-brand-title" class="fw-bold mb-1 text-dark brand-text-name">ตำแรด แซ่บนัว</h3>
      <p class="text-muted small mb-4">เข้าสู่ระบบสำหรับแอดมิน</p>

      <div class="text-start mb-3">
        <label class="form-label small fw-bold text-muted ms-1">ชื่อผู้ใช้งาน</label>
        <div class="input-group mb-3">
          <span class="input-group-text bg-light border-0 text-muted" style="border-radius: 16px 0 0 16px;"><i class="bi bi-person-fill"></i></span>
          <input type="text" id="admin-username" class="form-control bg-light border-0 shadow-none" style="border-radius: 0 16px 16px 0;" placeholder="Username" autocomplete="username">
        </div>

        <label class="form-label small fw-bold text-muted ms-1">รหัสผ่าน</label>
        <div class="input-group">
          <span class="input-group-text bg-light border-0 text-muted" style="border-radius: 16px 0 0 16px;"><i class="bi bi-lock-fill"></i></span>
          <input type="password" id="admin-password" class="form-control bg-light border-0 shadow-none" style="border-radius: 0 16px 16px 0;" placeholder="Password" autocomplete="current-password">
        </div>
      </div>

      <button type="button" class="btn-login" id="btn-submit-login" onclick="attemptLogin()">
        <span id="login-btn-text">เข้าสู่ระบบ</span>
        <span id="login-btn-spinner" class="spinner-border spinner-border-sm d-none"></span>
      </button>

      <div id="login-error-msg" class="login-error">
        <i class="bi bi-exclamation-circle-fill me-1"></i> ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง
      </div>
    </div>
  </section>

  <script>
    const INACTIVITY_LIMIT = 5 * 60 * 1000;

    function isWebAppExecUrl(u) {
      if (!u || typeof u !== 'string') return false;
      return /https:\/\/script\.google\.com\/macros\/[^/]+\/[^/]+\/exec$/i.test(String(u).replace(/\/?$/, ''));
    }

    /** ฐาน .../exec จากเซิร์ฟเวอร์เท่านั้น — ห้ามใช้ URL iframe googleusercontent */
    function getWebAppExecBase() {
      if (typeof window.__WEB_APP_BASE__ === 'string' && window.__WEB_APP_BASE__.length > 0) {
        var b = window.__WEB_APP_BASE__.replace(/\/?$/, '');
        if (isWebAppExecUrl(b)) return b;
      }
      return '';
    }

    function assignLocationPreferTop(url) {
      try {
        if (window.top && window.top !== window.self) {
          window.top.location.href = url;
          return;
        }
      } catch (e) { /* cross-origin */ }
      window.location.href = url;
    }

    /** หลังบ้าน — ?page=Admin */
    function getAdminPageUrl() {
      var isGas = typeof google !== 'undefined' && google.script && google.script.run;
      var base = getWebAppExecBase();
      if (base) {
        var qs = 'page=Admin';
        if (isGas) qs += '&gas=' + Date.now();
        return base + '?' + qs;
      }
      var raw = String(window.location.href || '').split('#')[0];
      var pathBase = raw.indexOf('?') >= 0 ? raw.split('?')[0] : raw;
      if (/login\.html$/i.test(pathBase)) {
        return pathBase.replace(/login\.html$/i, 'admin.html') + '?page=Admin';
      }
      return '';
    }

    function goToAdminPage() {
      var url = getAdminPageUrl();
      if (url) {
        assignLocationPreferTop(url);
        return;
      }
      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (execUrl) {
            if (execUrl && isWebAppExecUrl(execUrl)) {
              assignLocationPreferTop(execUrl.replace(/\/?$/, '') + '?page=Admin&gas=' + Date.now());
            } else {
              assignLocationPreferTop('admin.html?page=Admin');
            }
          })
          .withFailureHandler(function () {
            assignLocationPreferTop('admin.html?page=Admin');
          })
          .getWebAppExecUrl();
      } else {
        assignLocationPreferTop('admin.html?page=Admin');
      }
    }

    function tryRedirectIfLoggedIn() {
      var sessionStr = localStorage.getItem('pos_admin_session');
      if (!sessionStr) return;
      try {
        var session = JSON.parse(sessionStr);
        if (Date.now() - session.timestamp < INACTIVITY_LIMIT) {
          goToAdminPage();
        }
      } catch (e) {
        localStorage.removeItem('pos_admin_session');
      }
    }

    const usernameInput = document.getElementById('admin-username');
    const passwordInput = document.getElementById('admin-password');

    usernameInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') passwordInput.focus();
    });
    passwordInput.addEventListener('keypress', function (e) {
      if (e.key === 'Enter') attemptLogin();
    });

    function attemptLogin() {
      var username = usernameInput.value.trim();
      var password = passwordInput.value.trim();

      if (!username || !password) {
        showLoginError('กรุณากรอกชื่อผู้ใช้งานและรหัสผ่านให้ครบถ้วน');
        return;
      }

      document.getElementById('login-btn-text').classList.add('d-none');
      document.getElementById('login-btn-spinner').classList.remove('d-none');
      document.getElementById('login-error-msg').style.display = 'none';

      if (typeof google !== 'undefined' && google.script && google.script.run) {
        google.script.run
          .withSuccessHandler(function (res) {
            document.getElementById('login-btn-text').classList.remove('d-none');
            document.getElementById('login-btn-spinner').classList.add('d-none');
            if (res && res.authenticated) {
              var user = res.user || { name: 'Owner', role: 'Owner' };
              localStorage.setItem('pos_admin_session', JSON.stringify({
                user: user,
                timestamp: Date.now()
              }));
              goToAdminPage();
            } else {
              showLoginError(res && res.message ? res.message : 'ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง');
            }
          })
          .withFailureHandler(function () {
            showLoginError('เกิดข้อผิดพลาดในการเชื่อมต่อ กรุณาลองใหม่');
          })
          .verifyAdminLogin(username, password);
      } else {
        setTimeout(function () {
          document.getElementById('login-btn-text').classList.remove('d-none');
          document.getElementById('login-btn-spinner').classList.add('d-none');
          if (username === 'admin' && password === 'admin123') {
            localStorage.setItem('pos_admin_session', JSON.stringify({
              user: { name: 'ผู้ดูแลระบบ (ทดสอบ)', role: 'Owner' },
              timestamp: Date.now()
            }));
            goToAdminPage();
          } else {
            showLoginError('ชื่อผู้ใช้งานหรือรหัสผ่านไม่ถูกต้อง (โหมดทดสอบ)');
          }
        }, 600);
      }
    }

    function showLoginError(msg) {
      document.getElementById('login-btn-text').classList.remove('d-none');
      document.getElementById('login-btn-spinner').classList.add('d-none');
      var errorMsgEl = document.getElementById('login-error-msg');
      errorMsgEl.innerHTML = '<i class="bi bi-exclamation-circle-fill me-1"></i> ' + (msg || 'ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง');
      errorMsgEl.style.display = 'block';
      passwordInput.value = '';
      passwordInput.focus();
    }

    var DEFAULT_LOGIN_LOGO = 'https://lh3.googleusercontent.com/d/1P7QyEmBDrd16omNL91JyE3FnKOwipBZ5';

    function applyLoginBranding(data) {
      if (!data) return;
      var name = data.storeName != null ? String(data.storeName).trim() : '';
      var logo = data.logoUrl != null ? String(data.logoUrl).trim() : '';
      var elImg = document.getElementById('login-brand-logo');
      var elTitle = document.getElementById('login-brand-title');
      if (name && elTitle) elTitle.textContent = name;
      if (logo && elImg) {
        elImg.onerror = function () {
          elImg.onerror = null;
          elImg.src = DEFAULT_LOGIN_LOGO;
        };
        elImg.src = logo;
      }
      if (name) document.title = 'เข้าสู่ระบบแอดมิน · ' + name;
    }

    function loadLoginBranding() {
      if (typeof google === 'undefined' || !google.script || !google.script.run) return;
      google.script.run
        .withSuccessHandler(function (data) {
          if (data) applyLoginBranding(data);
        })
        .withFailureHandler(function () {})
        .getStoreSettings();
    }

    window.addEventListener('DOMContentLoaded', function () {
      loadLoginBranding();
      tryRedirectIfLoggedIn();
    });
  </script>
</body>
</html>
